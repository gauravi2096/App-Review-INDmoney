# Run the Product Pulse pipeline every Monday at 10:00 AM IST.
# Triggers the pipeline so the one-pager email is sent automatically to recipients
# managed in the Streamlit UI (when Streamlit is connected to the same Phase 6 API).
#
# Setup:
# 1. Deploy Phase 6 (Node) so it is reachable at a public URL.
# 2. In Streamlit, use "Use external Phase 6 API" and set P6_API_URL to that URL.
#    Recipients you add in Streamlit are then stored in Phase 6's DB.
# 3. In this repo: Settings → Secrets → Actions, add:
#    PIPELINE_TRIGGER_URL = https://your-phase6-host/api/pipeline/run
#    (Optional) PIPELINE_TRIGGER_SECRET = bearer token if you protect the endpoint.

name: Weekly Product Pulse Pipeline

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC (IST = UTC+5:30)
    - cron: '30 4 * * 1'
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        env:
          PIPELINE_URL: ${{ secrets.PIPELINE_TRIGGER_URL }}
          PIPELINE_SECRET: ${{ secrets.PIPELINE_TRIGGER_SECRET }}
        run: |
          if [ -z "$PIPELINE_URL" ]; then
            echo "PIPELINE_TRIGGER_URL secret is not set. Skipping trigger."
            echo "Add it in repo Settings → Secrets and variables → Actions."
            exit 0
          fi
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/body -X POST \
            ${PIPELINE_SECRET:+-H "Authorization: Bearer $PIPELINE_SECRET"} \
            "$PIPELINE_URL")
          echo "Response HTTP $HTTP_CODE"
          cat /tmp/body
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Pipeline triggered successfully."
          else
            echo "Pipeline trigger returned $HTTP_CODE. Check Phase 6 server and URL."
            exit 1
          fi
