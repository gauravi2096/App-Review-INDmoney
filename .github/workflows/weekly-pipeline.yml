# Run the Product Pulse pipeline every Monday at 10:00 AM IST.
# The pipeline (P1→P5) runs on the Phase 6 server that has the DB and recipient list;
# this workflow only triggers that endpoint so the one-pager email is sent to UI-managed recipients.
#
# Required secret: PIPELINE_TRIGGER_URL = full URL to POST (e.g. https://your-phase6-host/api/pipeline/run)
# Optional secret: PIPELINE_TRIGGER_SECRET = bearer token; set in Phase 6 if you want to validate it.

name: Weekly Product Pulse Pipeline

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC (IST = UTC+5:30)
    - cron: '30 4 * * 1'
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        env:
          PIPELINE_URL: ${{ secrets.PIPELINE_TRIGGER_URL }}
          PIPELINE_SECRET: ${{ secrets.PIPELINE_TRIGGER_SECRET }}
        run: |
          if [ -z "$PIPELINE_URL" ]; then
            echo "PIPELINE_TRIGGER_URL secret is not set. Skipping trigger."
            echo "Add it in repo Settings → Secrets and variables → Actions."
            exit 0
          fi
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/body -X POST \
            ${PIPELINE_SECRET:+-H "Authorization: Bearer $PIPELINE_SECRET"} \
            "$PIPELINE_URL")
          echo "Response HTTP $HTTP_CODE"
          cat /tmp/body
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Pipeline triggered successfully."
          else
            echo "Pipeline trigger returned $HTTP_CODE. Check Phase 6 server and URL."
            exit 1
          fi
